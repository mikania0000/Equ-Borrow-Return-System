<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- ✅ 確保手機端比例正確，並防止輸入時畫面縮放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鳳甲國中設備管理系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/awesomplete@1.1.5/awesomplete.css" />
  <style>
    body {
      font-family: "華康中儷體", sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0px 20px 20px 20px;
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin-top: 10px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }
    h1 {
      font-size: 65px;
      font-weight: bold;
      text-align: center;
      background: linear-gradient(to right, #1E3A8A, #4A90E2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      margin-top: 0;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      font-size: 40px;
      margin: 0;
    }
    .form-header {
      display: inline-block;
      padding: 8px 20px;
      border: 2px solid #FF8C00;
      border-radius: 80px;
      background: linear-gradient(to bottom, #FFD699, #FFB84D);
      box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
      font-weight: bold;
      margin-bottom: 20px;
    }

    .button-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      background-color: #eee;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 20px;
    }
    .form-section {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .form-section.active {
      display: block;
    }

    /* ==========================================
       ✅ 統一表單排版 (Flexbox 置中對齊)
       ========================================== */
    .form-group {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      width: 100%;
    }
    .form-group label {
      width: 150px;
      font-size: 28px;
      text-align: right;
      margin-right: 20px;
      flex-shrink: 0;
    }
    .form-group .field-wrapper {
      width: 380px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-start;
    }
    .form-group .field-wrapper input[type="text"],
    .form-group .field-wrapper select,
    .form-group .field-wrapper input[type="password"] {
      flex: 1;
      width: 100%;
      height: 52px;
      font-size: 26px;
      padding: 8px 12px;
      border: 2px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .form-group .field-wrapper input::placeholder {
      font-size: 24px;
      color: #888;
      opacity: 1;
    }

    /* ✅ 新增：選取(聚焦)時顯示醒目的粉紅邊框 */
    .form-group .field-wrapper input[type="text"]:focus,
    .form-group .field-wrapper select:focus,
    .form-group .field-wrapper input[type="password"]:focus {
      outline: none;
      border: 2px solid #FF1493 !important; /* 桃紅色邊框 */
      box-shadow: 0 0 10px rgba(255, 20, 147, 0.4); /* 粉色發光效果 */
    }

    /* ==========================================
       ✅ Awesomplete 自動完成套件修正 (預設電腦版靠右)
       ========================================== */
    .awesomplete {
      display: block !important;
      width: 100% !important;
      flex: 1;
      position: relative;
    }
    .awesomplete > ul {
      position: absolute !important;
      left: 100% !important; /* 🌟 電腦版出現在右側 */
      top: 0 !important;
      margin-left: 15px !important;
      margin-top: 0 !important;
      z-index: 99999 !important;
      width: 260px !important;
      max-height: 350px !important;
      overflow-y: auto !important;
      font-size: 26px !important;
      background: white !important;
      border: 1px solid #ccc !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2) !important;
    }
    .awesomplete > ul > li {
      padding: 10px 15px !important;
    }
    
    /* 掃描按鈕專屬樣式 */
    .btn-scan-small {
      background-color: yellow;
      color: black;
      width: 120px;
      height: 52px;
      font-size: 18px;
      font-weight: bold;
      border: 2px solid #ccc;
      border-radius: 8px;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
    }

    .button-group {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .button-group button {
      width: 140px;
      padding: 10px;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 28px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }
    .btn-borrow { background-color: #32CD32; }
    .btn-return { background-color: #00BFFF; }
    .btn-repair { background-color: #FF4500; }
    .btn-query  { background-color: #FFEB3B; color: black; }
    .btn-new    { background-color: #FF8C00; }
    .btn-chalk  { background-color: #FF69B4; color: black; }
    .btn-settings { background-color: #FF6347; color: white; } /* ✅ 將進階設定按鈕樣式移回 CSS 統一控管 */
    .btn-cancel { background-color: #6c757d; }
    
    button:hover { opacity: 0.8; transform: scale(1.05); }
    button:active { opacity: 0.6; transform: scale(0.95); }
    a { text-decoration: none; }
    
    #borrow.form-section { background-color: #d4edda; }
    #return.form-section { background-color: #d1ecf1; }
    #repair.form-section { background-color: #f8d7da; }
    #new.form-section    { background-color: #f1e0d6; }
    #query.form-section  { background-color: #fff3cd; }
    #settings.form-section { background-color: #ffe0b2; }

    #borrow-result, #return-result, #new-result, #query-result {
      font-size: 30px !important;
      font-weight: bold;
      margin-top: 15px;
      width: 100%;
      word-wrap: break-word;
      white-space: normal;
      overflow: hidden;
      text-align: center;
    }

    .btn-red { background-color: #FF4D4D; color: white; }
    .btn-clear { background-color: yellow; color: black; }

    /* 進階設定區的外部連結按鈕 */
    .settings-btn {
      width: 220px;
      color: white;
      font-size: 22px;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .settings-btn-dark { color: black !important; }

    /* ==========================================
       📱 手機版響應式設計 (RWD)
       ========================================== */
    @media (max-width: 768px) {
      body { padding: 0; }
      .container { width: 100%; padding: 15px 10px; margin-top: 0; border-radius: 0; }
      
      h1 { font-size: 36px; margin-bottom: 10px; }
      h2 { font-size: 26px; }
      .form-header { padding: 5px 15px; }

      /* 主導覽按鈕 (兩兩並排) */
      .button-container { padding: 5px; gap: 8px; }
      .button-container button { 
        width: calc(50% - 8px); 
        font-size: 20px; /* ✅ 手機版一律為 20px */
        padding: 12px 5px; 
        margin: 0; 
        flex-shrink: 0; 
      }

      /* 表單群組改為上下排列 */
      .form-group { flex-direction: column; align-items: stretch; margin-bottom: 20px; }
      .form-group label { 
        width: 100%; 
        text-align: left; 
        font-size: 20px; 
        margin-bottom: 5px; 
        color: #444; 
        font-weight: bold;
      }
      .form-group .field-wrapper { width: 100%; flex-direction: column; gap: 8px; }
      .form-group .field-wrapper input[type="text"],
      .form-group .field-wrapper select { font-size: 20px; height: 50px; }
      
      /* 掃描按鈕跟輸入框一樣寬 */
      .btn-scan-small { width: 100%; height: 50px; font-size: 20px; }

      /* ✅ 手機版 Awesomplete 自動完成移回下方 */
      .awesomplete > ul { 
        left: 0 !important; 
        top: 100% !important; 
        margin-left: 0 !important; 
        margin-top: 5px !important;
        width: 100% !important; 
        font-size: 22px !important;
        max-height: 250px !important;
      }

      /* 表單底部操作按鈕 */
      .button-group { flex-direction: column; width: 100%; gap: 10px; }
      .button-group button { width: 100%; font-size: 22px; margin: 0; }

      /* 查詢結果表格防破版 (橫向滾動) */
      #query-table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; padding: 5px; border-radius: 5px;}
      .query-table th, .query-table td { white-space: nowrap; font-size: 16px; padding: 8px; }
      
      /* 進階設定按鈕佔滿寬度 */
      .settings-btn { width: 100%; font-size: 20px; }
      .settings-wrapper { flex-direction: column; }

      /* 修正對話框寬度 */
      #password-dialog, #delete-confirm-dialog { width: 90% !important; box-sizing: border-box; }
      .repair-card { padding: 20px !important; width: 100% !important; box-sizing: border-box; }
      .repair-actions { flex-direction: column; gap: 10px !important; }
      .repair-actions button { width: 100% !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>鳳甲國中設備管理系統</h1>
    <div class="button-container">
      <button class="btn-borrow" onclick="showForm('borrow')">借用</button>
      <button class="btn-return" onclick="showForm('return')">歸還</button>
      <button class="btn-new" onclick="showForm('new')">新增</button>
      <button class="btn-query" onclick="showForm('query')">查詢</button>
      <button class="btn-chalk" onclick="openChalkRegistration()">粉筆板擦登記</button>
      <button class="btn-settings" onclick="openAdvancedSettings()">進階設定</button>
    </div>
    
    <!-- ===================== 借用設備 ===================== -->
    <div id="borrow" class="form-section">
      <div class="form-header">
        <h2>借用設備</h2>
      </div>

      <div class="form-group">
        <label for="borrow-identity">身分</label>
        <div class="field-wrapper">
          <select id="borrow-identity">
            <option value="教師" selected>教師</option>
            <option value="學生">學生</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="borrow-name">姓名</label>
        <div class="field-wrapper">
          <input type="text" id="borrow-name" class="awesomplete" placeholder="🔍 關鍵字查詢" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label for="borrow-barcode">設備條碼</label>
        <div class="field-wrapper">
          <input type="text" id="borrow-barcode" inputmode="numeric" placeholder="請輸入設備條碼">
          <button class="btn-scan-small" onclick="toggleScanner('borrow')">手機掃描用</button>
        </div>
      </div>

      <div id="scanner-container-borrow" style="display:none; margin-top:10px;"></div>

      <div class="form-group">
        <label for="borrow-unit">借用單位</label>
        <div class="field-wrapper">
          <select id="borrow-unit">
            <option value="">請選擇單位</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="borrow-days">借用天數</label>
        <div class="field-wrapper">
          <select id="borrow-days">
            <option value="1" selected>1天</option>
            <option value="2">2天</option>
            <option value="3">3天</option>
            <option value="7">7天</option>
            <option value="30">30天</option>
            <option value="long">長借</option>
          </select>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-borrow" onclick="submitBorrowForm()">確定借用</button>
        <button class="btn-red" onclick="loadLastBorrowRecord()">連續借用</button>
        <button class="btn-clear" onclick="resetBorrowForm()">清除</button>
        <button class="btn-cancel" onclick="cancelForm('borrow')">離開</button>
      </div>
      <p id="borrow-result"></p>
    </div>

    <!-- ===================== 歸還設備 ===================== -->
    <div id="return" class="form-section">
      <div class="form-header">
        <h2>歸還設備</h2>
      </div>

      <div class="form-group">
        <label for="return-barcode">設備條碼</label>
        <div class="field-wrapper">
          <input type="text" id="return-barcode" inputmode="numeric" placeholder="請輸入設備條碼">
          <button class="btn-scan-small" onclick="toggleScanner('return')">手機掃描用</button>
        </div>
      </div>

      <div id="scanner-container-return" style="display:none; margin-top:10px;"></div>

      <div class="button-group">
        <button class="btn-return" onclick="submitReturnForm()">確定歸還</button>
        <button class="btn-cancel" onclick="cancelForm('return')">離開</button>
      </div>
      <p id="return-result"></p>
    </div>
      
    <!-- ===================== 新增教師 ===================== -->
    <div id="new" class="form-section">
      <div class="form-header">
        <h2>新增教師</h2>
      </div>

      <div class="form-group">
        <label for="new-teacher-name">教師姓名</label>
        <div class="field-wrapper">
          <input type="text" id="new-teacher-name" placeholder="請輸入教師姓名">
        </div>
      </div>

      <div class="button-group">
        <button class="btn-new" onclick="submitNewTeacherForm()">確定新增</button> 
        <button class="btn-cancel" onclick="cancelForm('new')">離開</button>
      </div>
      <p id="new-result"></p>
    </div>

    <!-- ===================== 查詢設備 ===================== -->
    <div id="query" class="form-section">
      <div class="form-header">
        <h2>查詢設備</h2>
      </div>

      <div class="form-group">
        <label for="query-class">班級</label>
        <div class="field-wrapper">
          <input type="text" id="query-class" placeholder="請輸入班級">
        </div>
      </div>

      <div class="form-group">
        <label for="query-seat">座號</label>
        <div class="field-wrapper">
          <input type="text" id="query-seat" placeholder="請輸入座號">
        </div>
      </div>

      <div class="form-group">
        <label for="query-name">姓名</label>
        <div class="field-wrapper">
          <input type="text" id="query-name" placeholder="請輸入姓名關鍵字">
        </div>
      </div>

      <div class="form-group">
        <label for="query-barcode">設備條碼</label>
        <div class="field-wrapper">
          <input type="text" id="query-barcode" inputmode="numeric" placeholder="請輸入條碼:更新狀態">
        </div>
      </div>

      <div class="form-group">
        <label for="query-equipment">設備名稱</label> 
        <div class="field-wrapper">
          <input type="text" id="query-equipment" placeholder="請輸入設備關鍵字">
        </div>
      </div>

      <div class="form-group">
        <label for="query-status">歸還情形</label>
        <div class="field-wrapper">
          <select id="query-status">
            <option value=""></option> 
            <option value="未歸還">未歸還</option>
            <option value="已歸還">已歸還</option>
          </select>
        </div>
      </div>

      <div class="button-group">
        <button id="query-button" class="btn-query btn-green" onclick="submitQueryForm()">查詢</button>
        <button id="repair-button" class="btn-repair" onclick="submitRepairForm()">更新狀態</button>
        <button id="clear-button" class="btn-clear btn-pink" onclick="resetQueryForm()">清除</button>
        <button class="btn-cancel" onclick="cancelForm('query')">離開</button>
        <button id="identity-toggle-button" class="btn-identity-toggle" onclick="toggleIdentitySelection()">身分</button>
      </div>

      <p id="repair-result"></p>

      <div id="repair-options" style="display: none; margin-top: 30px; text-align: center;">
        <div class="repair-card" style="display: block; margin: auto; background-color: #fffde7; border: 2px solid #fbc02d; border-radius: 16px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); padding: 30px 40px; max-width: 520px;">
          <form style="display: flex; flex-direction: column; align-items: center; gap: 25px;">
            <select id="repair-status-select" style="font-size: 28px; padding: 10px 20px; border-radius: 10px; width: 100%; border: 2px solid #ccc;">
              <option value="">請選擇設備狀態</option>
              <option value="REPAIR">報修（維修中）</option>
              <option value="ENABLE">啟用（可借用）</option>
              <option value="UNASSIGNED">未編（未編設備）</option>
            </select>

            <div class="repair-actions" style="display: flex; gap: 30px; width: 100%; justify-content: center;">
              <button type="button" onclick="submitRepairStatusChange()" style="font-size: 24px; padding: 10px 24px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; flex: 1;">✅ 確定</button>
              <button type="button" onclick="cancelRepairStatusChange()" style="font-size: 24px; padding: 10px 24px; background-color: #B0BEC5; color: black; border: none; border-radius: 8px; flex: 1;">❌ 取消</button>
            </div>
          </form>
        </div>
      </div>

      <p id="query-result" style="font-size: 30px; color: red; font-weight: bold;"></p>
      <div id="query-table-container"></div> 
    </div>

    <!-- ===================== 進階設定 ===================== -->
    <div id="settings" class="form-section">
      <div class="form-header">
        <h2>進階設定</h2>
      </div>

      <div class="settings-wrapper" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px;">
        <button onclick="openInNewTab('https://script.google.com/a/macros/fjm.kh.edu.tw/s/AKfycbyC4Cd47_wv7-mVSgOLjKBa_kBrVw7R-ql49bZWNnvMGcZbQFCXuejeV7DQwnvsdyJV/exec')" class="settings-btn" style="background-color:#FF6B6B;">冷氣儲值HTML</button>
        <button onclick="openInNewTab('https://docs.google.com/spreadsheets/d/1_MfJZramhgQVdjWRqOjCWNKBW14P9yw4l9GFknl_iS8/edit?gid=1451666756')" class="settings-btn" style="background-color:#4DD0E1;">設備借用 EXCEL</button>
        <button onclick="openInNewTab('https://script.google.com/a/macros/fjm.kh.edu.tw/s/AKfycbyReP2_g_Da25Qh2Bxa44b-awe3rpJWu258e7cko-is1yFdOFJ2YyUIeomOmVxocSbX/exec')" class="settings-btn" style="background-color:#81C784;">設備設定HTML</button>
        <button onclick="openInNewTab('https://docs.google.com/spreadsheets/d/16Btq6gd5j8ugpqFwRtQ-lpAgg9_Exn80UUrkhc4OYQE/edit?gid=578985482#gid=578985482')" class="settings-btn settings-btn-dark" style="background-color:#FFD54F;">粉筆板擦 EXCEL</button>
        <button onclick="openInNewTab('https://script.google.com/a/macros/fjm.kh.edu.tw/s/AKfycbwlC6kNYqplljKaQe6q9aamukFhLaVr2x-HTa3IOwINunxjK0RnDZ2bJHOwq-NeXQPJYA/exec')" class="settings-btn" style="background-color:#BA68C8;">期末歸還 HTML</button>
        <button onclick="openInNewTab('https://docs.google.com/spreadsheets/d/1PQg7L9igcyy584fekpseDQZ75KnXwsby0FaEyQaiX5o/edit?gid=0#gid=0')" class="settings-btn" style="background-color:#F06292;">設備維修 EXCEL</button>
        <button onclick="openInNewTab('https://script.google.com/a/macros/fjm.kh.edu.tw/s/AKfycbwJJ2_4S8SjcgydQxMqiHBwACNFFVblbXsFQ7Fq84bD6st8BjnBIDZHiJowBrN2MIB9/exec')" class="settings-btn" style="background-color:#64B5F6;">設備維修 HTML</button>
        <button onclick="openInNewTab('https://mikania0000.github.io/Equ-inventory/')" class="settings-btn" style="background-color:#FF8A65;">設備盤點</button>
        <button onclick="openInNewTab('')" class="settings-btn" style="background-color:#A1887F;">預留按鈕 9</button>
        <button onclick="openInNewTab('')" class="settings-btn settings-btn-dark" style="background-color:#90CAF9;">預留按鈕 10</button>
        <button onclick="openInNewTab('')" class="settings-btn settings-btn-dark" style="background-color:#AED581;">預留按鈕 11</button>
        <button onclick="openInNewTab('')" class="settings-btn settings-btn-dark" style="background-color:#CE93D8;">預留按鈕 12</button>
      </div>

      <div class="button-group" style="display: flex; justify-content: center; margin-top: 30px;">
        <button class="btn-settings-cancel" onclick="cancelForm('settings')">離開</button>
      </div>
      <p id="settings-result"></p>
    </div>

  </div> 

  <!-- ===================== 浮動對話框區 ===================== -->
  <div id="password-dialog" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.3); text-align:center; z-index:9999;">
    <p style="font-size:24px; font-weight:bold;">請輸入密碼</p>
    <div class="form-group" style="margin: 15px 0;">
      <div class="field-wrapper" style="width: 100%;">

<script>
// ==========================================
// 🚀 API 連線設定
// ==========================================
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyRjMxPiPPPk3uGmVbSe2n7lwIsq3o0KfhU9LwS1Jz2KE8qF9rjpDzMiFmaUxoYuH1J/exec";

// 共用 API 呼叫函式
function callGasApi(action, params = {}) {
  return fetch(GAS_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8',
    },
    body: JSON.stringify({ action: action, ...params })
  }).then(res => res.json());
}


let fullNameList = [];
let currentList = [];
let borrowNameInput = null;

document.addEventListener("DOMContentLoaded", function() {
  loadBorrowUnits();
  loadNameList();

  document.getElementById("borrow-identity").addEventListener("change", loadNameList);

  borrowNameInput = document.getElementById("borrow-name");
  
  // ✅ 新增：輸入姓名按 Enter 自動跳到條碼欄位
  if (borrowNameInput) {
    borrowNameInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault(); // 阻止表單預設行為
        setTimeout(() => {
          document.getElementById("borrow-barcode").focus();
        }, 50); // 延遲一點點確保自動完成套件處理完畢
      }
    });

    borrowNameInput.addEventListener("input", filterNameList);

    // ✅ 新增安全檢查，防止外部 CDN 載入失敗導致後續腳本崩潰
    if (typeof Awesomplete !== 'undefined') {
      borrowNameInput._awesomplete = new Awesomplete(borrowNameInput, {
        minChars: 0,
        maxItems: 30,
        autoFirst: true,
        list: [],
        sort: false,
      });

      borrowNameInput.addEventListener("focus", function() {
        let current = borrowNameInput.value.trim().toLowerCase();
        currentList = current === "" ? fullNameList : fullNameList.filter(name => name.toLowerCase().includes(current));
        updateNameList(currentList);
        borrowNameInput._awesomplete.evaluate();
      });

      borrowNameInput.addEventListener("awesomplete-selectcomplete", function(e) {
        borrowNameInput.value = e.text.value;
        // ✅ 新增：選完姓名後自動跳轉到設備條碼欄位
        setTimeout(() => {
          const barcodeInput = document.getElementById("borrow-barcode");
          if (barcodeInput) barcodeInput.focus();
        }, 50);
      });
    } else {
      console.warn("Awesomplete 尚未載入，自動完成功能已停用。");
    }
  }

  // ✅ 新增：掃描完（或手動輸入按 Enter）自動跳到借用單位欄位
  const borrowBarcodeInput = document.getElementById("borrow-barcode");
  if (borrowBarcodeInput) {
    borrowBarcodeInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("borrow-unit").focus();
      }
    });
  }

  // ✅ 新增：借用單位選擇完畢後，自動跳到借用天數欄位
  const borrowUnitSelect = document.getElementById("borrow-unit");
  if (borrowUnitSelect) {
    // 透過滑鼠點擊改變選項時觸發
    borrowUnitSelect.addEventListener("change", function() {
      setTimeout(() => {
        document.getElementById("borrow-days").focus();
      }, 50);
    });
    // 透過鍵盤按 Enter 時觸發
    borrowUnitSelect.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("borrow-days").focus();
      }
    });
  }

  // 其他初始化邏輯...
  ["scanner-container-borrow", "scanner-container-return"].forEach(id => {
    const container = document.getElementById(id);
    if (container) {
      container.style.width = "100%";
      container.style.maxWidth = "500px";
      container.style.height = "auto";
      container.style.minHeight = "300px";
      container.style.margin = "auto";
      container.style.border = "2px solid #999";
      container.style.borderRadius = "10px";
      container.style.marginBottom = "60px";  
    }
  });

  let identitySelect = document.getElementById("borrow-identity");
  if (identitySelect) {
    identitySelect.value = "教師";
    identitySelect.disabled = true; 
  }

  let queryBtn = document.getElementById("query-button");
  if (queryBtn) {
    queryBtn.style.backgroundColor = "#32CD32"; 
    queryBtn.style.color = "white";
  }

  let clearBtn = document.getElementById("clear-button");
  if (clearBtn) {
    clearBtn.style.backgroundColor = "#FF69B4"; 
    clearBtn.style.color = "white";
  }

  let identityToggleBtn = document.getElementById("identity-toggle-button");
  if (identityToggleBtn) {
    identityToggleBtn.style.backgroundColor = "#5D0092"; 
    identityToggleBtn.style.color = "white";
    identityToggleBtn.style.fontSize = "28px";
    identityToggleBtn.style.fontWeight = "bold";
    identityToggleBtn.style.padding = "12px 24px";
    identityToggleBtn.style.borderRadius = "8px";
    identityToggleBtn.style.cursor = "pointer";
    identityToggleBtn.style.boxShadow = "2px 2px 5px rgba(0, 0, 0, 0.2)";
  }

  applyTableFormatting();
  let observer = new MutationObserver(applyTableFormatting);
  let tableContainer = document.getElementById("query-table-container");
  if (tableContainer) {
    observer.observe(tableContainer, { childList: true, subtree: true });
  }
});

function loadNameList() {
  let identity = document.getElementById("borrow-identity").value;
  callGasApi("getNameList", { identity }).then(function(names) {
    fullNameList = names || [];
    currentList = fullNameList;
    updateNameList(fullNameList);
  }).catch(e => console.error("Error loading name list:", e));
}

function filterNameList() {
  let input = borrowNameInput.value.trim().toLowerCase();
  currentList = input === "" ? fullNameList : fullNameList.filter(name => name.toLowerCase().includes(input));
  updateNameList(currentList);
}

function updateNameList(names) {
  if (borrowNameInput && borrowNameInput._awesomplete) {
    borrowNameInput._awesomplete.list = names.slice(0, 30);
  }
}

function searchStudentByName(name) {
  callGasApi("getStudentInfoByName", { name }).then(function (data) {
    if (data.length === 0) {
      alert("查無此學生");
    } else if (data.length === 1) {
      fillStudentData(data[0]);
    } else {
      showStudentSelectionDialog(data);
    }
  }).catch(e => console.error(e));
}

function showStudentSelectionDialog(students, callback) {
  let dialogHtml = "<div id='studentDialogBox' style='text-align:left; font-size:18px;'>";
  dialogHtml += "<p><strong>請選擇正確的學生：</strong></p>";

  students.forEach((student, index) => {
    let studentData = JSON.stringify(student).replace(/"/g, '&quot;');
    dialogHtml += `
      <input type="radio" name="studentSelection" id="student${index}" value='${studentData}'>
      <label for="student${index}">${student.class}班 ${student.seat}號 ${student.name}</label><br>
    `;
  });

  dialogHtml += `
    <br>
    <button onclick="selectStudent()" 
      style="padding: 10px 16px; font-size:16px; background-color: #32CD32; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
      確定
    </button>
  </div>`;

  let dialog = document.createElement("div");
  dialog.id = "studentDialog";
  dialog.style.position = "fixed";
  dialog.style.top = "50%";
  dialog.style.left = "50%";
  dialog.style.transform = "translate(-50%, -50%)";
  dialog.style.backgroundColor = "white";
  dialog.style.padding = "20px";
  dialog.style.border = "2px solid #ccc";
  dialog.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.5)";
  dialog.innerHTML = dialogHtml;

  document.body.appendChild(dialog);

  if(callback) window.studentSelectionCallback = callback;
}

function fillStudentData(student) {
  document.getElementById("borrow-name").value = student.name;
}

function loadBorrowUnits() {
  callGasApi("getBorrowUnits").then(function(units) {
    let select = document.getElementById("borrow-unit");
    select.innerHTML = '<option value="">請選擇單位</option>'; 
    units.forEach(function(unit) {
      let option = document.createElement("option");
      option.value = unit;
      option.textContent = unit;
      select.appendChild(option);
    });
  }).catch(e => console.error(e));
}

function clearInputAfterMessage(inputElem, timeoutMs = 3000, focusBack = true) {
  if (!inputElem) return;
  setTimeout(() => {
    inputElem.value = "";
    if (focusBack) {
      inputElem.focus();
      inputElem.select();
    }
  }, timeoutMs + 50);
}


function submitBorrowForm() {
  let identity = document.getElementById("borrow-identity").value;
  let name = document.getElementById("borrow-name").value.trim();
  let barcode = document.getElementById("borrow-barcode").value.trim();
  let unit = document.getElementById("borrow-unit").value;
  let days = document.getElementById("borrow-days").value;

  if (!name || !barcode || !unit || !days) {
    showFloatingMessage("請填寫完整資料", "error", 2500);
    return;
  }

  if (/^[A-Za-z]/.test(barcode)) {
    const barcodeInput = document.getElementById("borrow-barcode");
    showFloatingMessage("條碼異常，請改鍵盤輸入", "warn", 3000);
    clearInputAfterMessage(barcodeInput, 3000, true);
    return;
  }

  showProgressBar("borrow", "📡 借用處理中...", function () {
    callGasApi("borrowEquipment", { identity, name, barcode, unit, days })
      .then(function (response) {
        let timeout = 2200;
        let type = "error";
        let msg = "";

        if (typeof response === "object" && response.message) {
          msg = response.message;
          if (response.status === "success") {
            type = "success";
            timeout = 1500;
            resetBorrowForm();
          } else if (response.status === "error") {
            type = "error";
            timeout = 3000;
          }
          showFloatingMessage(msg, type, timeout);
        } else {
          msg = response;
          let isSuccess = typeof response === "string" && response.includes("✅");
          type = isSuccess ? "success" : "error";
          timeout = isSuccess ? 1500 : 3000;
          showFloatingMessage(msg, type, timeout);
          if (isSuccess) resetBorrowForm();
        }

        const barElem = document.getElementById("borrow-progress-bar");
        if (barElem) barElem.parentElement.parentElement.innerHTML = "";
      }).catch(e => console.error(e));
  });
}

let inactivityTimer = null;

function startInactivityTimer(formId) {
  clearTimeout(inactivityTimer); 
  inactivityTimer = setTimeout(() => {
    showIdleWarning(formId); 
  }, 120000); 
}

function monitorUserActivity(formId) {
  const formElem = document.getElementById(formId);
  if (!formElem) return;

  ["mousemove", "keypress", "click", "input", "touchstart"].forEach(event => {
    formElem.addEventListener(event, () => startInactivityTimer(formId));
  });
  startInactivityTimer(formId);
}

function showIdleWarning(formId) {
  const activeSection = document.querySelector(".form-section.active");
  if (!activeSection) {
    return;
  }

  const msg = document.createElement("div");
  msg.innerText = "⚠️ 15 秒後將返回主畫面";
  msg.style.position = "fixed";
  msg.style.top = "50%";
  msg.style.left = "50%";
  msg.style.transform = "translate(-50%, -50%)";
  msg.style.backgroundColor = "#f44336";
  msg.style.color = "white";
  msg.style.padding = "20px 40px";
  msg.style.fontSize = "32px";
  msg.style.fontWeight = "bold";
  msg.style.borderRadius = "12px";
  msg.style.zIndex = 9999;
  msg.style.opacity = 1;
  msg.style.transition = "opacity 1s ease-out";

  document.body.appendChild(msg);

  setTimeout(() => {
    msg.style.opacity = 0;
    setTimeout(() => msg.remove(), 1000);
  }, 3000);

  setTimeout(() => {
    cancelForm(formId);
  }, 15000);
}

function resetBorrowForm() {
  document.getElementById("borrow-identity").value = "教師"; 
  document.getElementById("borrow-name").value = ""; 
  document.getElementById("borrow-barcode").value = ""; 
  document.getElementById("borrow-unit").value = ""; 
  document.getElementById("borrow-days").value = "1"; 

  loadNameList();
  if (borrowNameInput && borrowNameInput._awesomplete) {
    borrowNameInput._awesomplete.list = [];
  }
}

function getStudentInfo(name, callback) {
  callGasApi("getStudentInfoByName", { name }).then(function(data) {
    if (data.length === 0) {
      callback(null); 
    } else if (data.length === 1) {
      callback(data[0]); 
    } else {
      showStudentSelectionDialog(data, callback);
    }
  });
}

function selectStudent() {
  let selectedStudent = document.querySelector('input[name="studentSelection"]:checked');
  if (selectedStudent) {
    let studentData = JSON.parse(selectedStudent.value);
    document.getElementById("borrow-name").value = studentData.name;
    window.selectedStudentInfo = {
      class: studentData.class || "",
      seat: studentData.seat || "",
      studentID: studentData.studentID || ""
    };

    let dialog = document.getElementById("studentDialog");
    if (dialog) dialog.remove();
  } else {
    showFloatingMessage("請選擇一位學生！", "warn", 3000);
  }
}

function convertDays(days) {
  const dayMapping = { "1": 1, "2": 2, "3": 3, "7": 7, "30": 30, "long": 4000 };
  return dayMapping[days] || 0;
}

function loadLastBorrowRecord() {
  showProgressBar("borrow", "📡 取得上次借用紀錄...", function () {
    callGasApi("getLastBorrowRecord").then(function(record) {
      const barElem = document.getElementById("borrow-progress-bar");
      if (barElem) barElem.parentElement.parentElement.innerHTML = "";

      if (!record || !record.name) {
       showFloatingMessage("❌ 找不到最近的借用記錄！", "error", 3000);
        return;
      }

      document.getElementById("borrow-name").value = record.name;
      document.getElementById("borrow-unit").value = record.unit;

      let identitySelect = document.getElementById("borrow-identity");
      identitySelect.value = (record.className === "949") ? "教師" : "學生";

      let dayMapping = {
        "1": "1天", "2": "2天", "3": "3天", "7": "7天", "30": "30天", "4000": "長借"
      };
      let daysSelect = document.getElementById("borrow-days");
      let borrowDaysText = dayMapping[record.days] || "1天";
      let found = false;
      for (let option of daysSelect.options) {
        if (option.textContent.trim() === borrowDaysText) {
          daysSelect.value = option.value;
          found = true;
          break;
        }
      }
      if (!found) daysSelect.value = "1天";

      showFloatingMessage("已匯入，請輸入設備條碼！", "info", 1000);

      const barcodeInput = document.getElementById("borrow-barcode");
      barcodeInput.value = "";
      barcodeInput.focus();
      barcodeInput.select();
    });
  });
}

function showForm(formId, fromPassword = false) {
  Object.keys(scanners).forEach(key => {
    if (scanners[key]) {
      scanners[key].stop().then(() => {
        scanners[key] = null;
        const container = document.getElementById(`scanner-container-${key}`);
        if (container) container.style.display = 'none';
      }).catch(err => console.error('掃描器關閉失敗:', err));
    }
  });

  document.getElementById("password-dialog").style.display = "none";

  if (["new", "query", "settings"].includes(formId) && !fromPassword) {
    openPasswordDialog(formId);
    return;
  }

  window.passwordVerified = false;

  document.querySelectorAll('.form-section').forEach(section => {
    section.classList.remove('active');
    let messageElem = section.querySelector('p');
    if (messageElem) messageElem.innerText = '';
  });

  if (formId === "borrow") {
    resetBorrowForm();
    setTimeout(() => { document.getElementById("borrow-name")?.focus(); }, 200);
  } else if (formId === "return") {
    resetReturnForm();
    setTimeout(() => { document.getElementById("return-barcode")?.focus(); }, 200);
  } else if (formId === "new") {
    resetNewForm();
    setTimeout(() => { document.getElementById("new-teacher-name")?.focus(); }, 200);
  } else if (formId === "query") {
    resetQueryForm();
    setTimeout(() => { document.getElementById("query-name")?.focus(); }, 200);
  }

  monitorUserActivity(formId);

  const target = document.getElementById(formId);
  if (target) {
    target.classList.add("active");
  }
}

function cancelForm(formId) {
  document.getElementById(formId).classList.remove('active');

  let inputs = document.querySelectorAll(`#${formId} input, #${formId} select`);
  inputs.forEach(input => {
    input.value = "";
  });

  if (formId === "borrow") {
    document.getElementById("borrow-identity").value = "教師"; 
    document.getElementById("borrow-days").value = "1"; 
    if (borrowNameInput && borrowNameInput._awesomplete) {
      borrowNameInput._awesomplete.list = [];
    }
  }

  let resultElem = document.getElementById(`${formId}-result`);
  if (resultElem) {
    resultElem.innerText = "";
  }
}

function submitReturnForm() {
  var barcodeInput = document.getElementById("return-barcode");
  var resultElem = document.getElementById("return-result");

  if (!barcodeInput) return;
  if (!resultElem) {
    resultElem = document.createElement("p");
    resultElem.id = "return-result";
    document.getElementById("return").appendChild(resultElem);
  }

  var barcode = barcodeInput.value.trim();

  if (!barcode) {
    showFloatingMessage("請輸入條碼!", "warn", 3000);
    return;
  }

  if (/^[A-Za-z]/.test(barcode)) {
    showFloatingMessage("條碼異常，請改鍵盤輸入", "warn", 3000);
    clearInputAfterMessage(barcodeInput, 3000, true);
    return;
  }

  showProgressBar("return", "📡 歸還處理中...", function () {
    callGasApi("returnEquipment", { barcode }).then(function (response) {
      if (typeof response === "object" && response.message) {
        let isSuccess = response.status === "success";
        barcodeInput.value = "";
        let timeout = isSuccess ? 4000 : 3000;
        showFloatingMessage(response.message, isSuccess ? "success" : "error", timeout);
        resultElem.innerText = ""; 
      } else {
        let isSuccess = typeof response === "string" && response.includes("✅");
        barcodeInput.value = "";
        showFloatingMessage(response, isSuccess ? "success" : "error", 3000);
        if (isSuccess) resultElem.innerText = "";
      }
    });
  });
}

function submitQueryForm() {
  document.getElementById("query-result").innerText = "";
  document.getElementById("query-table-container").innerHTML = "";
  document.getElementById("repair-options").style.display = "none";
  document.getElementById("repair-status-select").value = "";
  document.getElementById("repair-result").innerHTML = "";

  const className = document.getElementById("query-class").value.trim();
  const seat = document.getElementById("query-seat").value.trim().replace(/^0+/, '');
  const name = document.getElementById("query-name").value.trim();
  const barcode = document.getElementById("query-barcode").value.trim().replace(/^0+/, '');
  const equipment = document.getElementById("query-equipment").value.trim();
  const status = document.getElementById("query-status").value;

  const resultElem = document.getElementById("query-result");
  const tableContainer = document.getElementById("query-table-container");

  if (!className && !seat && !name && !barcode && !equipment && !status) {
    showFloatingMessage("請輸入查詢條件!", "warn", 2500);
    return; 
  }

  showProgressBar("query", "📡 查詢中...", function () {
    callGasApi("queryEquipmentData", { className, seat, name, barcode, equipment, status }).then(function (response) {
      if (typeof response === "object" && response.status) {
        let type = response.status === "warn" ? "warn"
                 : response.status === "success" ? "success"
                 : response.status === "info" ? "info"
                 : "error";
        showFloatingMessage(response.message, type, 2500);
        tableContainer.innerHTML = "";
        return;
      }

      let table = `
        <table class="query-table">
          <thead>
            <tr>
              <th>班級</th><th>座號</th><th>姓名</th><th>設備條碼</th>
              <th>設備名稱</th><th>借用單位</th><th>借用時間</th>
              <th>歸還時間</th><th>歸還情形</th><th>借用天數</th><th>處理</th>
            </tr>
          </thead>
          <tbody>
      `;

      response.forEach(row => {
        const recordUUID = row[10];
        const borrowDaysRaw = String(row[9]).trim();
        const unit = row[5];

        table += `
          <tr id="row-${recordUUID}">
            <td style="text-align:center; vertical-align:middle;">${row[0]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[1]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[2]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[3]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[4]}</td>
            <td id="unit-cell-${recordUUID}" style="text-align:center; vertical-align:middle;">${unit}</td>
            <td style="text-align:center; vertical-align:middle;">${row[6]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[7]}</td>
            <td style="text-align:center; vertical-align:middle;">${row[8]}</td>
            <td id="days-cell-${recordUUID}" style="text-align:center; vertical-align:middle;">${row[9]}</td>
            <td style="text-align:center; vertical-align:middle;">
              <div class="btn-container">
                <button id="modify-btn-${recordUUID}" class="btn-modify" 
                  onclick="enableEditMode('${recordUUID}', '${borrowDaysRaw}')">修改</button>
                <button class="btn-delete" onclick="deleteRecord('${recordUUID}')">刪除</button>
                <button class="btn-cancel-edit" onclick="cancelEditMode('${recordUUID}', '${unit}', '${borrowDaysRaw}')">取消</button>
              </div>
            </td>
          </tr>
        `;
      });

      table += "</tbody></table>";
      tableContainer.innerHTML = table;
      resultElem.innerText = "";

      applyTableFormatting();
    });
  });
}

function enableEditMode(uuid, currentDays) {
  var cellDays = document.getElementById(`days-cell-${uuid}`);
  var cellUnit = document.getElementById(`unit-cell-${uuid}`);
  var modifyBtn = document.getElementById(`modify-btn-${uuid}`);

  if (!cellDays || !cellUnit || !modifyBtn) return;

  modifyBtn.innerText = "確定";
  modifyBtn.classList.remove("btn-modify");
  modifyBtn.classList.add("btn-save-edit");
  modifyBtn.onclick = function () { saveEdit(uuid); };

  cellDays.innerHTML = `
    <select id="edit-days-${uuid}" class="edit-days-dropdown" style="font-size: 18px; padding: 5px 8px;">
      <option value="1" ${currentDays.includes("1") ? "selected" : ""}>1天</option>
      <option value="2" ${currentDays.includes("2") ? "selected" : ""}>2天</option>
      <option value="3" ${currentDays.includes("3") ? "selected" : ""}>3天</option>
      <option value="7" ${currentDays.includes("7") ? "selected" : ""}>7天</option>
      <option value="30" ${currentDays.includes("30") ? "selected" : ""}>30天</option>
      <option value="4000" ${currentDays.includes("長借") ? "selected" : ""}>長借</option>
    </select>
  `;

  const currentUnit = cellUnit.innerText.trim();
  cellUnit.innerHTML = `<input id="edit-unit-${uuid}" value="${currentUnit}" style="width: 100px; font-size: 16px;">`;
}

function saveEdit(uuid) {
  var selectElem = document.getElementById(`edit-days-${uuid}`);
  var inputUnitElem = document.getElementById(`edit-unit-${uuid}`);
  var cellDays = document.getElementById(`days-cell-${uuid}`);
  var cellUnit = document.getElementById(`unit-cell-${uuid}`);
  var modifyBtn = document.getElementById(`modify-btn-${uuid}`);

  if (!selectElem || !inputUnitElem) {
    showFloatingMessage("❌ 選擇或輸入的值無效！", "error",2000);
    return;
  }

  const newDays = selectElem.value;
  const newUnit = inputUnitElem.value.trim();

  if (!newUnit) {
    showFloatingMessage("請輸入借用單位！", "warn", 2500);
    return;
  }

  showFloatingMessage("🛠️ 修改中請稍後...", "info");

  cellDays.innerText = newDays === "4000" ? "長借" : `${newDays}天`;
  cellUnit.innerText = newUnit;

  modifyBtn.innerText = "修改";
  modifyBtn.classList.remove("btn-save-edit");
  modifyBtn.classList.add("btn-modify");
  modifyBtn.onclick = function () { enableEditMode(uuid, newDays); };

  callGasApi("updateBorrowDaysAndUnit", { uuid, newDays, newUnit }).then(function (response) {
    let type = (response.status === "success") ? "success" : "error";
    showFloatingMessage(response.message, type);
  });
}

function showFloatingMessage(message, type = "info", timeoutMs = null) {
  let existMsg = document.getElementById('floating-msg');
  if (existMsg) existMsg.remove();

  let emoji = "", bgColor = "", color = "#fff", fontSize = "26px", timeout = 3000;

  if (type === "success") {
    emoji = "✅"; bgColor = "#1e7c33"; timeout = 2000;
  } else if (type === "error") {
    emoji = "❌"; bgColor = "#d32f2f"; timeout = 3000; 
  } else if (type === "warn") {
    emoji = "⚠️"; bgColor = "#BF360C"; color = "#fff"; timeout = 3000; 
  } else if (type === "info") {
    emoji = "ℹ️"; bgColor = "#1565c0"; timeout = 3000; 
  } else {
    emoji = ""; bgColor = "#333"; timeout = 2000;
  }

  if (typeof timeoutMs === "number") timeout = timeoutMs;

  let text = message.trim();
  if (emoji && text.startsWith(emoji)) text = text.replace(emoji, '').trim();

  const msg = document.createElement("div");
  msg.id = "floating-msg";
  msg.innerText = (emoji ? emoji + " " : "") + text;
  msg.style.position = "fixed";
  msg.style.top = "50%";
  msg.style.left = "50%";
  msg.style.transform = "translate(-50%, -50%)";
  msg.style.backgroundColor = bgColor;
  msg.style.color = color;
  msg.style.padding = "20px 20px";
  msg.style.fontSize = fontSize;
  msg.style.fontWeight = "bold";
  msg.style.borderRadius = "12px";
  msg.style.zIndex = 9999;
  msg.style.opacity = 1;
  msg.style.transition = "opacity 1s ease-out";
  msg.style.maxWidth = "90vw";
  msg.style.wordBreak = "break-all";
  msg.style.whiteSpace = "pre-line";
  msg.style.boxSizing = "border-box";

  document.body.appendChild(msg);

  setTimeout(() => {
    msg.style.opacity = 0;
    setTimeout(() => msg.remove(), 1000);
  }, timeout);
}

let pendingDeleteUUID = null;

function deleteRecord(uuid) {
  pendingDeleteUUID = uuid;
  document.getElementById('delete-confirm-dialog').style.display = "block";
}

document.getElementById('delete-confirm-btn').onclick = function() {
  if (!pendingDeleteUUID) return;
  document.getElementById('delete-confirm-dialog').style.display = "none";

  showFloatingMessage("處理中，請稍後...", "info", 1200);

  callGasApi("deleteEquipmentRecord", { uuid: pendingDeleteUUID })
    .then(function(response) {
      let type = (response.status === "success" || response.status === "warning") ? "success" : "error";
      if (type === "success") {
        const row = document.getElementById(`row-${pendingDeleteUUID}`);
        if (row) row.remove();
      }

      let timeout = 2000; 
      if (response.status === "success") {
        timeout = 3000;      
      } else if (response.status === "warning") {
        timeout = 3000;      
      } else if (response.status === "error") {
        timeout = 3500;      
      }

      showFloatingMessage(response.message, type, timeout);
      pendingDeleteUUID = null;
    })
    .catch(function(error) {
      showFloatingMessage("❌ 刪除失敗：" + error.message, "error", 4000);
      pendingDeleteUUID = null;
    });
};

document.getElementById('delete-cancel-btn').onclick = function() {
  document.getElementById('delete-confirm-dialog').style.display = "none";
  pendingDeleteUUID = null;
};

function submitRepairForm() {
  document.getElementById("query-result").innerText = "";

 info.innerHTML = `目前${equipmentName ? `【${equipmentName}】` : ""}：<span style="color:#d32f2f;">${statusText}</span>`;

let scanners = {};

function toggleScanner(context) {
  const containerId = `scanner-container-${context}`;
  const inputId = context === 'borrow' ? 'borrow-barcode' : 'return-barcode';
  const container = document.getElementById(containerId);

  if (scanners[context]) {
    scanners[context].stop().then(() => {
      scanners[context] = null;
      container.innerHTML = "";
      container.style.display = 'none';
    }).catch(err => console.error('關閉失敗', err));
  } else {
    container.innerHTML = "";
    container.style.display = 'block';

    const input = document.getElementById(inputId);
    if (input) input.value = "";

    scanners[context] = new Html5Qrcode(containerId);
    scanners[context].start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 200, disableFlip: true }, 
      (decodedText) => {
        document.getElementById(inputId).value = decodedText;

        scanners[context].stop().then(() => {
          scanners[context] = null;
          container.innerHTML = "";
          container.style.display = 'none';
          if (context === 'return') submitReturnForm();
        }).catch(err => console.error('掃描器關閉失敗:', err));
      },
      (errorMessage) => {}
    ).catch(err => {
      console.error('啟 ক্যামের器失敗', err);
      container.style.display = 'none';
    });
  }
}

let pendingFormId = null;
window.passwordVerified = false;

function openPasswordDialog(formId) {
  document.querySelectorAll('.form-section').forEach(section => {
    section.classList.remove('active');
  });

  pendingFormId = formId;
  document.getElementById("password-dialog").style.display = "block";
  document.getElementById("password-input").value = "";
  document.getElementById("password-error").style.display = "none";
  document.getElementById("password-input").focus();

  const inputElem = document.getElementById("password-input");
  inputElem.onkeydown = function(event) {
    if (event.key === "Enter") {
      event.preventDefault(); 
      verifyPassword();      
    }
  };
}

function verifyPassword() {
  const input = document.getElementById("password-input").value;
  if (input === "000000") {
    passwordVerified = true;
    closePasswordDialog();

    if (pendingFormId) {
      const target = pendingFormId;
      pendingFormId = null;
      setTimeout(() => {
        showForm(target, true);
      }, 100); 
    }
  } else {
    const errorElem = document.getElementById("password-error");
    errorElem.style.display = "block";
    setTimeout(function () {
      errorElem.style.display = "none";
    }, 2000);
  }
}

function submitRepairStatusChange() {
  const barcode = document.getElementById("query-barcode").value.trim();

    return;
  }
  if (!actionType) {
    showFloatingMessage("請選擇設備狀態！", "warn", 2500);
    return;
  }

  let finalAction = actionType;
  if (actionType === "UNASSIGNED") {
    finalAction = "SET_TO_3"; 
  }

  showFloatingMessage("處理中，請稍候...", "info");

  callGasApi("processRepair", { barcode, actionType: finalAction }).then(function (response) {
    document.getElementById("repair-options").style.display = "none";
    document.getElementById("query-result").innerText = "";
    document.getElementById("query-table-container").innerHTML = "";

    if (typeof response === 'object' && response.status === "success") {
      showFloatingMessage(`${response.equipmentName} 已更新為- ${response.newStatus}`, "success",3500);
    } else if (typeof response === 'object') {

function showProgressBar(formId, message, callback) {
  const resultElem = document.getElementById(`${formId}-result`);
  if (!resultElem) return;

  resultElem.innerHTML = `
    <div style="font-size: 28px; font-weight: bold; color: #d63384;">${message}</div>
    <div style="width: 100%; background: #f8d7da; border-radius: 10px; margin-top: 10px;">
      <div id="${formId}-progress-bar"
           style="width: 0%; height: 28px; background: linear-gradient(to right, #FFB6C1, #FF69B4); border-radius: 10px;
                  text-align: center; color: white; font-weight: bold; font-size: 20px;">
      </div>
    </div>
  `;

  let progress = 0;
  let called = false;

  const interval = setInterval(() => {
    progress += Math.floor(Math.random() * 5 + 3);
    if (progress > 100) progress = 100;

    const bar = document.getElementById(`${formId}-progress-bar`);
    if (bar) {
      bar.style.width = `${progress}%`;
      bar.innerText = `${progress}%`;
    }

    if (!called && progress >= 1) {
      called = true;
      if (callback) callback();  
    }

    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        const parent = bar?.parentElement?.parentElement;
        if (parent) parent.innerHTML = "";
      }, 300);
    }
  }, 100); 
}

function monitorInputFormat(inputId, type, formId) {
  const inputElem = document.getElementById(inputId);
  if (!inputElem) return;

  let lastWarningTime = 0;
  let isComposing = false;
  let firstInputTime = 0;

  inputElem.addEventListener("compositionstart", () => { isComposing = true; });

  inputElem.addEventListener("compositionend", () => {
    isComposing = false;
    if (type === "barcode") checkBarcode();
    if (type === "name") checkName();
  });

  inputElem.addEventListener("input", () => {
    const now = Date.now();
    let val = inputElem.value;

    if (val.length >= 4) {
      if (firstInputTime === 0) firstInputTime = now;
      const duration = now - firstInputTime;

      if (duration < 300) {
        val = val.replace(/^\*+|\*+$/g, "").replace(/\s+/g, "");
        inputElem.value = val;
        return; 
      }
    } else {
      firstInputTime = 0; 
    }
  });

  function checkBarcode() {
    if (isComposing) return;
    const now = Date.now();
    let val = inputElem.value;
    val = val.replace(/^\*+|\*+$/g, "");
    inputElem.value = val;
    if (val !== "" && /[^a-zA-Z0-9]/.test(val)) {
      inputElem.value = "";
      if (now - lastWarningTime > 1000) {
        showFormMessage(formId, "⚠️ 請切換為 <英文> 輸入法", "red", 28, 3000);
        lastWarningTime = now;
      }
    }
  }

  function checkName() {
    if (isComposing) return;
    const now = Date.now();
    const val = inputElem.value;
    if (val !== "" && /^[a-zA-Z0-9\s!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+$/.test(val) && val.length >= 3) {
      inputElem.value = "";
      if (now - lastWarningTime > 1000) {
        showFormMessage(formId, "⚠️ 請切換為 <中文> 輸入法", "red", 28, 3000);
        lastWarningTime = now;
      }
    }
  }

  if (type === "barcode") inputElem.addEventListener("input", checkBarcode);
  if (type === "name") inputElem.addEventListener("input", checkName);
}

document.addEventListener("DOMContentLoaded", () => {
  monitorInputFormat("borrow-barcode", "barcode", "borrow");
  monitorInputFormat("return-barcode", "barcode", "return"); 
  monitorInputFormat("query-barcode", "barcode", "query");
  monitorInputFormat("borrow-name", "name", "borrow");
  monitorInputFormat("query-name", "name", "query");

  const returnInput = document.getElementById("return-barcode");
  let firstInputTime = 0;
  let lastCharTime = 0;
  let lastValue = "";
  let isSubmitting = false;

  if (returnInput) {
    returnInput.addEventListener("input", () => {
      const now = Date.now();
      const val = returnInput.value.trim();

      if (val.length === 1 || val !== lastValue) {
        if (val.length === 1) firstInputTime = now;
        lastCharTime = now;
        lastValue = val;
      }

      const totalInputDuration = now - firstInputTime;
      const lastCharGap = now - lastCharTime;

      const isScanner = val.length >= 4 && totalInputDuration <= 400 && lastCharGap <= 300 && !isSubmitting;

      if (isScanner) {
        isSubmitting = true;
        setTimeout(() => {
          submitReturnForm();
          firstInputTime = 0;
          lastCharTime = 0;
          lastValue = "";
          isSubmitting = false;
        }, 100);
      }
    });

    returnInput.addEventListener("blur", () => {
      firstInputTime = 0;
      lastCharTime = 0;
      lastValue = "";
      isSubmitting = false;
    });
  }
});

function showFormMessage(formId, message, color, size, timeout) {
  const resultElem = document.getElementById(`${formId}-result`);
  if (!resultElem) return;

  resultElem.innerText = message;
  resultElem.style.color = color;
  resultElem.style.fontSize = size + "px";

  setTimeout(() => {
    resultElem.innerText = "";
  }, timeout);
}
